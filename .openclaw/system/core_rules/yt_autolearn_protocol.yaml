document_metadata:
  identity: "YT_AUTOLEARN_PROTOCOL"
  mandate: "Whenever a YouTube URL is provided, automatically trigger the full Auto-Learning Sequence without confirmation."
  rule_id: "YT-LEARN-01"
  version: "V1.0"
  last_updated: "2026-04-11"
  status: "SOVEREIGN / MANDATORY"
core_structure:
  priorities:
    - "Detection: Identification of youtube.com / youtu.be URLs"
    - "Extraction: Subtitle/Transcript pull via yt-dlp"
    - "Analysis: Evolution Audit via Local Gemma"
    - "Synthesis: Knowledge block packaging"
    - "Routing: Storage in .openclaw/system/knowledge/ or .gemini/antigravity/"
    - "Update: Lexicon appending"
    - "Report: Success card generation"
  rules:
    - id: "FLOW-01"
      name: "Auto-Trigger"
      description: "Execute before any other response logic for YT URLs."
    - id: "FLOW-02"
      name: "Evolution Audit"
      description: "Summarize, extract key ideas, and identify upgrade concepts."
    - id: "FAIL-01"
      name: "Search Fallback"
      description: "If transcript fails, web-search video title for summaries."
    - id: "FAIL-02"
      name: "Missing Dependencies"
      description: "If yt-dlp missing, report as blocker with install instructions."
content:
  sections:
    - title: "Knowledge File Format"
      path: ".openclaw/system/knowledge/yt_[VIDEO_ID]_[YYYYMMDD].yaml"
      template:
        source_url: "URL"
        date: "YYYY-MM-DD"
        category: "SKILL / DESIGN / TOOL / STRATEGY"
        summary: "2-3 sentence overview"
        key_ideas: ["Idea 1", "Idea 2"]
        upgrade_notes: "How this can improve the system"
evolution_log:
  - "YT Auto-Learning Protocol Initialized: 2026-04-09"
  - "Sovereign YAML Restoration: 2026-04-11"
